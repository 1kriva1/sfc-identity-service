apiVersion: apps/v1
kind: Deployment
metadata:
  name: sfc-identity-deployment
  namespace: sfc
  labels:
    app.kubernetes.io/name: sfc-identity
    app.kubernetes.io/component: application
    app.kubernetes.io/part-of: sfc
    app.kubernetes.io/instance: production
    app.kubernetes.io/version: "latest"
    app.kubernetes.io/managed-by: kubectl
  annotations:
    owner: "krivorukandrey@gmail.com"
    purpose: "Deployment for Identity component in SFC application"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: sfc-identity
  replicas: 2
  minReadySeconds: 5
  progressDeadlineSeconds: 60
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sfc-identity
        app.kubernetes.io/component: application
        app.kubernetes.io/part-of: sfc
        app.kubernetes.io/instance: production
    spec:
      serviceAccountName: sfc-identity-service-account
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: sfc-identity      
      initContainers:
        - name: sfc-identity-init-dependencies
          image: nicolaka/netshoot:latest
          command: 
            - sh
            - -c
            - |              
              set -e
              print_dns() { getent hosts "$1" || echo "DNS: cannot resolve $1"; }
              wait_on() {
                local host="$1" port="$2" name="$3"
                echo "----"
                echo "Resolving ${name} host: ${host}"
                print_dns "${host}" || true
                echo "Waiting for ${name} at ${host}:${port} ..."
                for i in $(seq 1 120); do
                  if nc -vz -w 2 "$host" "$port"; then
                    echo "${name} is reachable."
                    return 0
                  fi
                  sleep 2
                done
                echo "Timeout waiting for ${name} at ${host}:${port}"
                exit 1
              }
              wait_on sfc-mssql.sfc.svc.cluster.local 1433 "MSSQL"
              wait_on sfc-redis.sfc.svc.cluster.local 6379 "Redis"
              wait_on sfc-rabbitmq.sfc.svc.cluster.local 5672 "RabbitMQ"
              echo "All dependencies are reachable!"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
        - name: sfc-identity-init-certificates
          image: kryvorukandrii/sfc.identity:latest
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              echo "==> Updating system trust store with SFC Root CA"
              test -f /usr/local/share/ca-certificates/sfc-root-ca.crt
              update-ca-certificates
              echo "==> Trust store updated successfully"
          volumeMounts:
            - name: sfc-identity-secret
              mountPath: /usr/local/share/ca-certificates/sfc-root-ca.crt
              subPath: sfc-root-ca.crt
              readOnly: true
            - name: sfc-identity-certificates
              mountPath: /etc/ssl/certs
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      containers:
        - name: sfc-identity
          image: kryvorukandrii/sfc.identity:latest
          imagePullPolicy: Always
          ports:
            - name: http-port
              protocol: TCP
              containerPort: 7265
            - name: https-port
              protocol: TCP
              containerPort: 7266
          env:
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                 name: sfc-identity-config-map
                 key: ASPNETCORE_ENVIRONMENT
          volumeMounts:            
            - name: sfc-identity-secret
              mountPath: /usr/local/share/ca-certificates/sfc-root-ca.crt
              subPath: sfc-root-ca.crt
              readOnly: true
            - name: sfc-identity-secret
              mountPath: /https/sfc-identity.pfx
              subPath: sfc-identity.pfx
              readOnly: true            
            - name: sfc-identity-certificates
              mountPath: /etc/ssl/certs
          startupProbe:
            tcpSocket:
              port: http-port
            initialDelaySeconds: 0
            periodSeconds: 3
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: http-port
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http-port
              scheme: HTTP
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          resources:
              requests:
                cpu: "500m"
                memory: "1Gi"
              limits:
                cpu: "1"
                memory: "1Gi"
      volumes:        
        - name: sfc-identity-certificates
          emptyDir: {}
        - name: sfc-identity-secret
          secret:
            secretName: sfc-identity-secret
            defaultMode: 0440
            items:
              - key: sfc-root-ca.crt
                path: sfc-root-ca.crt
                mode: 0444
              - key: sfc-identity.pfx
                path: sfc-identity.pfx
                mode: 0400