#github action to build and test SFC.Identity application

name: Build and Test SFC.Identity Application

on:
  workflow_dispatch:  
  pull_request:
    branches: [ "master" ]

env:
  DOTNET_VERSION: 8.0.x 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
  
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Dotnet restore dependencies
        run: dotnet restore SFC.Identity.sln

      - name: Dotnet build
        run: dotnet build SFC.Identity.sln --no-restore --configuration Release

      - name: Dotnet test
        run: dotnet test SFC.Identity.sln --no-restore --no-build --configuration Release --verbosity normal /p:CollectCoverage=true /p:Threshold=0 /p:ThresholdStat=total

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
            node-version: '20'

      - name: Npm install dependencies
        run: npm install
        working-directory: ./src/Client/SFC.Identity.Client

      - name: Npm build
        run: npm run build
        working-directory: ./src/Client/SFC.Identity.Client

      - name: Npm test
        run: npm run test:code-coverage:no-browser
        working-directory: ./src/Client/SFC.Identity.Client

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build --tag ${{ secrets.DOCKER_ID }}/${{ vars.IMAGE_NAME }}:latest --build-arg BUILD_CONFIGURATION=Release --build-arg HTTP_PORT=7265 --build-arg HTTPS_PORT=7266 --file src/API/SFC.Identity.Api/Dockerfile .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_ID }}/${{ vars.IMAGE_NAME }}:latest