name: sfc-identity
include:
   - compose.Infrastructure.yaml
x-build-args: &build_args
  args:
    BUILD_CONFIGURATION: Release
x-entrypoint-common-volume: &entrypoint_common_volume
  type: bind
  source: ${PWD}/entrypoint.Common.sh
  target: /app/entrypoint.Common.sh
x-entrypoint-volume: &entrypoint_volume
  type: bind
  source: ${PWD}/entrypoint.sh
  target: /app/entrypoint.sh
services:
  sfc-identity:
    extends:
      file: compose.Common.yaml
      service: sfc-identity  
    image: kryvorukandrii/sfc.identity:latest
    build:
      dockerfile: src/API/SFC.Identity.Api/Dockerfile
      <<: *build_args
    entrypoint: ["/bin/sh", "entrypoint.sh"]
    command: ["SFC.Identity.Api"]
    env_file:
      - environments/api/api.Production.env
    volumes:
      - *entrypoint_common_volume
      - *entrypoint_volume  